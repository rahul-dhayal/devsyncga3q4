name: Daily Automated Commit

on:
  schedule:
    - cron: "17 4 * * *"   # Runs daily at 04:17 UTC (choose fixed time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 25ds2000022@ds.study.iitm.ac.in - Update File
        run: |
          echo "Last updated on $(date -u)" > daily-update.txt

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add daily-update.txt
          git commit -m "Daily automated commit - $(date -u)" || echo "No changes to commit"
          git push
